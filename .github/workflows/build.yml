name: Build Zygisk Module

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Ambil Kode Proyek
        uses: actions/checkout@v4

      - name: Siapkan Android NDK r25c
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c
          add-to-path: true

      - name: Mulai Kompilasi Kode (ndk-build)
        run: |
          ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=./Android.mk NDK_APPLICATION_MK=./Application.mk

      - name: Proses dan Kemas Jadi ZIP Modul Magisk
        run: |
          # Menyalin file arm64-v8a.so dari hasil build ke folder root utama
          cp libs/arm64-v8a/arm64-v8a.so ./
          
          # Membungkus semua file penting menjadi satu file ZIP matang
          zip -r Zygisk_ESP_FF_Belajar.zip arm64-v8a.so customize.sh module.prop

      - name: Unggah File ZIP Siap Flash
        uses: actions/upload-artifact@v4
        with:
          name: Modul-Zygisk-Siap-Flash
          path: Zygisk_ESP_FF_Belajar.zip
